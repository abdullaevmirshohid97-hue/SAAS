all:
  children:
    production:
      hosts:
        clary-prod:
          ansible_host: '{{ lookup("env", "VPS_HOST") }}'
          ansible_user: clary
          ansible_port: 22
          ansible_ssh_private_key_file: ~/.ssh/clary_vps_ed25519
    staging:
      hosts:
        clary-staging:
          ansible_host: '{{ lookup("env", "VPS_STAGING_HOST") }}'
          ansible_user: clary
