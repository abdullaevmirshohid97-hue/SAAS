<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="owl" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Clary boyqush belgisi -->
  <g transform="translate(120, 150)">
    <rect x="0" y="0" width="160" height="160" rx="40" fill="url(#owl)"/>
    <g transform="scale(4)">
      <path d="M11 11 L9.5 4 L15 9 Z" fill="#fff"/>
      <path d="M29 11 L30.5 4 L25 9 Z" fill="#fff"/>
      <ellipse cx="20" cy="22" rx="13" ry="13.5" fill="#fff"/>
      <circle cx="15" cy="20" r="4.2" fill="#0f172a"/>
      <circle cx="25" cy="20" r="4.2" fill="#0f172a"/>
      <circle cx="13.8" cy="18.8" r="1.3" fill="#fff"/>
      <circle cx="23.8" cy="18.8" r="1.3" fill="#fff"/>
      <circle cx="15" cy="20" r="5.6" fill="none" stroke="#0f172a" stroke-width="1.5"/>
      <circle cx="25" cy="20" r="5.6" fill="none" stroke="#0f172a" stroke-width="1.5"/>
      <line x1="20.6" y1="20" x2="19.4" y2="20" stroke="#0f172a" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M20 25 L17 30 L20 32.5 L23 30 Z" fill="#F59E0B"/>
    </g>
  </g>

  <!-- Sarlavha -->
  <text x="120" y="400" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="84" font-weight="800" fill="#FFFFFF" letter-spacing="-2">Clary</text>
  <text x="120" y="475" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
