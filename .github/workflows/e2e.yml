name: E2E (Playwright)

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  playwright:
    name: Playwright web E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm -F @clary/tests-e2e-web test
        env:
          BASE_URL_APP: http://localhost:5173
          BASE_URL_ADMIN: http://localhost:5174
          BASE_URL_LANDING: http://localhost:4321
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/e2e-web/playwright-report
          retention-days: 14
