name: Deploy (staging)

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  migrate:
    name: Supabase migrations (staging)
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
      - run: supabase link --project-ref ${{ secrets.SUPABASE_STAGING_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      - run: supabase db push
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}

  deploy:
    name: Deploy to VPS (staging)
    runs-on: ubuntu-latest
    needs: migrate
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via Dokploy webhook
        run: |
          curl -fsSL -X POST "${{ secrets.DOKPLOY_STAGING_WEBHOOK }}" \
            -H "Authorization: Bearer ${{ secrets.DOKPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"ref":"${{ github.sha }}"}'
